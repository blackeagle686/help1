{% extends 'portal/base.html' %}

{% block title %}صناع الأثر - بصمة قنا{% endblock %}

{% block content %}
<div class="container">
    <div class="section-title">
        <h2>صناع الأثر</h2>
    </div>
    
    <div class="cards-grid">
        {% for maker in stories %}
            <div class="card" onclick="location.href='{% url 'story_detail' maker.pk %}'">
                <div class="card-img" style="background-image: url('{{ maker.image|default:'https://via.placeholder.com/400x300/3b82f6/ffffff?text=Story+Maker' }}')">
                </div>
                <div class="card-content">
                    <h3 class="card-title">{{ maker.name }}</h3>
                    <div class="card-subtitle">{{ maker.title }}</div>
                </div>
            </div>
        {% empty %}
            <p style="grid-column: 1/-1; text-align: center; color: #64748B;">لا يوجد صناع أثر حالياً.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
